apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
resources:
- ../../base
patches:
- target:
    kind: ResourceQuota
    name: namespace-quota
  patch: |-
    - op: replace
      path: /spec/hard/requests.cpu
      value: "16"
    - op: replace
      path: /spec/hard/requests.memory
      value: "32Gi"
    - op: replace
      path: /spec/hard/limits.cpu
      value: "32"
    - op: replace
      path: /spec/hard/limits.memory
      value: "64Gi"
    - op: replace
      path: /spec/hard/pods
      value: "60"
- target:
    kind: LimitRange
    name: namespace-limits
  patch: |-
    - op: replace
      path: /spec/limits/0/default/cpu
      value: "500m"
    - op: replace
      path: /spec/limits/0/default/memory
      value: "512Mi"
    - op: replace
      path: /spec/limits/0/defaultRequest/cpu
      value: "250m"
    - op: replace
      path: /spec/limits/0/defaultRequest/memory
      value: "256Mi"
    - op: replace
      path: /spec/limits/0/min/cpu
      value: "100m"
    - op: replace
      path: /spec/limits/0/min/memory
      value: "128Mi"
    - op: replace
      path: /spec/limits/0/max/cpu
      value: "8"
    - op: replace
      path: /spec/limits/0/max/memory
      value: "16Gi"
apiVersion: v1
kind: LimitRange
metadata: 
  name: namespace-limits
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 128Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      min:
        cpu: 10m
        memory: 16Mi
      max:
        cpu: 500m
        memory: 256Mi
      
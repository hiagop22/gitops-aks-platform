apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: nginx
    repo: oci://registry-1.docker.io/bitnamicharts
    version: 25.0.9
    releaseName: nginx
    valuesInline:
      service:
        type: ClusterIP
      replicaCount: 2
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      metrics:
        enabled: false
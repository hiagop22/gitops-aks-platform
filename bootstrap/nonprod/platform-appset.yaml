apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  generators:
    - git:
        revision: feat/add-kube-prometheus-stack
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        directories:
          - path: clusters/nonprod/platform/*

  template:
    metadata:
      name: '{{.path.basename}}'
      namespace: argocd

    spec:
      project: platform

      source:
        path: '{{.path.path}}'
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        targetRevision: feat/add-kube-prometheus-stack

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true
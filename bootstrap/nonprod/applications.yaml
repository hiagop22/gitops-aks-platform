apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  # ----- Anchors -----
  x-common: &common
    goTemplate: true
    template:
      metadata:
        namespace: argocd
      spec:
        destination:
          server: https://kubernetes.default.svc
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
  
  x-source: &source
    repoURL: https://github.com/hiagop22/gitops-aks-platform.git
    targetRevision: refactor/secure-project-folders
  
  # ----- Actual spec -----
  <<: *common
  generators:
    - list:
        elements:
          - env: dev
          - env: qa
          - env: staging
  template:
    metadata:
      name: '{{.env}}-apps'
    spec:
      <<: *common.template.spec
      project: '{{.env}}-apps'
      source:
        <<: *source
        path: clusters/nonprod/environments/{{.env}}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.env}}'

---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  <<: *common
  generators:
    - git:
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        revision: refactor/secure-project-folders
        directories:
          - path: clusters/nonprod/infrastructure/*
  template:
    metadata:
      name: '{{.path.basename}}'
    spec:
      <<: *common.template.spec
      project: nonprod
      source:
        <<: *source
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  generators:
    - git:
        revision: feat/argocd-deployment
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        directories:
          - path: clusters/nonprod/infrastructure/*

  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
    spec:
      project: nonprod
      source:
        path: '{{path}}'
        repoURL: '{{repoURL}}'
        targetRevision: '{{.revision}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          syncOptions:
            - CreateNamespace=true
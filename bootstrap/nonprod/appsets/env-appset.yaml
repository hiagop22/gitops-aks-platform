apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  generators:
    - list:
        - env: dev
          revision: feat/argocd-deployment

  template:
    metadata:
      name: '{{env}}-apps'
      namespace: argocd
    spec:
      project: '{{env}}-apps'
      source:
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        targetRevision: '{{.revision}}'
        path: clusters/nonprod/environments/{{env}}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          syncOptions:
            - CreateNamespace=true
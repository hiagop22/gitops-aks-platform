apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: projects-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        revision: refactor/secure-project-folders
        directories:
          - path: bootstrap/nonprod/projects/env/overlays/*

  template:
    metadata:
      name: '{{.path.basename}}-app-project'
      namespace: argocd
    spec:
      project: 'default'
      source:
        path: '{{.path.path}}'
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        targetRevision: refactor/secure-project-folders
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          syncOptions:
            - CreateNamespace=true
x-project-base: &project-base
  apiVersion: argoproj.io/v1alpha1
  kind: AppProject
  metadata:
    namespace: argocd
    annotations:
      argocd.argoproj.io/sync-wave: "-1"
  spec:
    sourceRepos:
      - https://github.com/hiagop22/gitops-aks-platform.git
    clusterResourceWhitelist:
      - group: '*'
        kind: '*'
    namespaceResourceWhitelist:
      - group: '*'
        kind: '*'
---
<<: *project-base
metadata:
  name: dev-apps
spec:
  destinations:
    - namespace: "dev-*"
      server: https://kubernetes.default.svc
---
<<: *project-base
metadata:
  name: qa-apps
spec:
  destinations:
    - namespace: "qa-*"
      server: https://kubernetes.default.svc
---
<<: *project-base
metadata:
  name: staging-apps
spec:
  destinations:
    - namespace: "qa-*"
      server: https://kubernetes.default.svc
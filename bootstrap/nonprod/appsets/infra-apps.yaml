apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  generators:
    - git:
        revision: refactor/secure-project-folders
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        directories:
          - path: clusters/nonprod/infrastructure/*

  template:
    metadata:
      name: '{{.path.basename}}'
      namespace: argocd
    spec:
      project: nonprod
      source:
        path: '{{.path.path}}'
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        targetRevision: refactor/secure-project-folders
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          syncOptions:
            - CreateNamespace=true
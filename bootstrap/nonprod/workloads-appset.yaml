apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-appset
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: dev
            revision: refactor/secure-project-folders

  template:
    metadata:
      name: '{{.env}}-apps'
      namespace: argocd
    spec:
      project: workloads
      source:
        repoURL: https://github.com/hiagop22/gitops-aks-platform.git
        targetRevision: '{{.revision}}'
        path: clusters/nonprod/environments/{{.env}}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true